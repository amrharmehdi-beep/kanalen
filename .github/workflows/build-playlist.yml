import re
import urllib.request

countries = ["qa", "eg", "sa", "ae", "ma"]
urls = [f"https://iptv-org.github.io/iptv/countries/{code}.m3u" for code in countries]

entries = []

def fetch(url):
    with urllib.request.urlopen(url, timeout=30) as r:
        return r.read().decode("utf-8", errors="ignore")

def channel_name(extinf_line):
    m = re.search(r',\s*(.*)$', extinf_line)
    return m.group(1).strip() if m else ""

def normalize_extinf(extinf_line):
    line = extinf_line.strip()

    if not line.startswith("#EXTINF:"):
        return line

    if 'group-title="' in line:
        line = re.sub(r'group-title="[^"]*"', 'group-title="Arabic IPTV"', line)
    else:
        line = line.replace("#EXTINF:-1", '#EXTINF:-1 group-title="Arabic IPTV"', 1)

    return line

seen_urls = set()

for url in urls:
    text = fetch(url)
    lines = text.splitlines()

    i = 0
    while i < len(lines):
        line = lines[i].strip()
        if line.startswith("#EXTINF:"):
            extinf = normalize_extinf(line)
            name = channel_name(extinf).lower()

            j = i + 1
            stream_url = ""
            while j < len(lines):
                candidate = lines[j].strip()
                if candidate and not candidate.startswith("#"):
                    stream_url = candidate
                    break
                j += 1

            # Skip slow/bad Al Aoula HD entries from source playlists
            blocked_names = [
                "al aula hd",
                "al aoula hd",
                "al oula hd",
                "aloula hd"
            ]

            if stream_url and stream_url not in seen_urls and not any(b in name for b in blocked_names):
                seen_urls.add(stream_url)
                entries.append((name, extinf, stream_url))

            i = j
        i += 1

# Add manual replacement
manual_channels = [
    (
        "al aoula international",
        '#EXTINF:-1 tvg-id="AlAoula.ma@Inter" tvg-name="Al Aoula International" tvg-logo="https://i.imgur.com/5Q7aW5C.png" group-title="Arabic IPTV",Al Aoula International',
        "https://uvotv-aniview.global.ssl.fastly.net/hls/live/2119051/aloulainter/playlist.m3u8"
    )
]

for name, extinf, stream_url in manual_channels:
    if stream_url not in seen_urls:
        seen_urls.add(stream_url)
        entries.append((name.lower(), extinf, stream_url))

entries.sort(key=lambda x: x[0])

epg_url = "https://iptv-org.github.io/epg/guides/arabic.channels.xml.gz"

with open("output/playlist.m3u", "w", encoding="utf-8") as f:
    f.write(f'#EXTM3U x-tvg-url="{epg_url}"\n')
    for _, extinf, stream_url in entries:
        f.write(extinf + "\n")
        f.write(stream_url + "\n")
